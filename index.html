  <link rel="apple-touch-icon" href="icon.svg">
<style>
:root {
  --bg:#07070e;--surface:rgba(255,255,255,.035);--border:rgba(255,255,255,.06);
  --hover:rgba(255,255,255,.08);--active:rgba(255,255,255,.12);
  --text:#e2e8f0;--text-dim:rgba(226,232,240,.4);
  --accent:#10b981;--accent-bright:#34d399;--accent-glow:rgba(16,185,129,.22);
  --red:#ef4444;--yellow:#eab308;--blue:#3b82f6;
  --radius:10px;--panel-h:52px;--ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  height:100%;height:100dvh;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 18% 40%,rgba(16,185,129,.045) 0%,transparent 100%),
    radial-gradient(ellipse 60% 50% at 82% 55%,rgba(59,130,246,.03) 0%,transparent 100%),
    radial-gradient(ellipse 50% 40% at 50% 95%,rgba(139,92,246,.025) 0%,transparent 100%);
  color:var(--text);
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  display:flex;flex-direction:column;overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  padding-bottom:calc(var(--panel-h) + env(safe-area-inset-bottom,0px));
  transition:padding-bottom .3s var(--ease),background .3s ease,color .3s ease;
}
body.panel-hidden{padding-bottom:0}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

.toolbar{display:flex;align-items:center;gap:.375rem;padding:.5rem .75rem;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;z-index:10}
.toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 .125rem}
.spacer{flex:1 1 auto}

.btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--radius);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background .2s ease,border-color .2s ease,box-shadow .2s ease,transform .1s ease;outline:none;font-family:inherit}
.btn:hover{background:var(--hover);border-color:rgba(255,255,255,.1)}
.btn:active{transform:scale(.94);background:var(--active)}
.btn:focus-visible{box-shadow:0 0 0 2px var(--accent),0 0 0 5px var(--accent-glow)}
.btn-icon{width:34px;height:34px;padding:0}
.btn-icon svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.btn-icon svg polygon{fill:currentColor;stroke:none}

.font-ctrl{display:flex;align-items:center;gap:.375rem}
.font-label{font-size:.6875rem;color:var(--text-dim);min-width:24px;text-align:right;font-variant-numeric:tabular-nums}
input[type="range"]{-webkit-appearance:none;appearance:none;width:80px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent-glow);border:none}
input[type="range"]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent-glow);border:none}

.stage{flex:1 1 0;display:flex;align-items:center;justify-content:center;padding:1.5rem;min-height:0;overflow:hidden}
.sub-stack{display:flex;flex-direction:column;align-items:center;gap:.6rem;max-width:min(84ch,94vw)}
.subtitle{text-align:center;font-size:clamp(18px,5.5vw,48px);line-height:1.32;text-shadow:0 2px 6px rgba(0,0,0,.8),0 0 24px rgba(0,0,0,.35);word-wrap:break-word;overflow-wrap:break-word;transition:opacity .15s ease}
.subtitle i,.subtitle em{font-style:italic} .subtitle b,.subtitle strong{font-weight:700} .subtitle u{text-decoration:underline}
.subtitle.empty{opacity:0}
.subtitle.placeholder{color:var(--text-dim);font-size:clamp(14px,3vw,20px);text-shadow:none;animation:breathe 4s ease-in-out infinite}
.subtitle.cue-enter{animation:cueIn .22s ease-out}
.subtitle-alt{font-size:clamp(14px,3.8vw,32px);color:var(--accent-bright);opacity:.75;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.subtitle-alt.empty{opacity:0}
.subtitle-alt.cue-enter{animation:cueIn .22s ease-out}

.timeline{height:3px;background:rgba(255,255,255,.06);cursor:pointer;flex-shrink:0;position:relative;z-index:2;transition:height .15s ease}
.timeline::before{content:'';position:absolute;inset:-10px 0}
.timeline:hover,.timeline.dragging{height:7px}
.timeline-fill{height:100%;background:linear-gradient(90deg,var(--accent),#06b6d4);border-radius:0 2px 2px 0;will-change:width;position:relative}
.timeline-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:11px;height:11px;border-radius:50%;background:var(--accent-bright);box-shadow:0 0 10px var(--accent-glow);opacity:0;transition:opacity .15s ease}
.timeline:hover .timeline-fill::after,.timeline.dragging .timeline-fill::after{opacity:1}

.status-bar{display:flex;align-items:center;gap:.5rem;padding:.35rem .75rem;flex-wrap:wrap;flex-shrink:0}
.status-pill{font-size:.6875rem;color:var(--text-dim);padding:.2rem .5rem;border:1px solid var(--border);border-radius:999px;white-space:nowrap;font-variant-numeric:tabular-nums}

.offset-panel{position:fixed;left:0;right:0;bottom:0;height:calc(var(--panel-h) + env(safe-area-inset-bottom,0px));padding:0 52px calc(env(safe-area-inset-bottom,0px)) 0;display:flex;align-items:center;justify-content:center;gap:.25rem;background:rgba(12,12,22,.92);border-top:1px solid rgba(255,255,255,.09);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:20;overflow-x:auto;-webkit-overflow-scrolling:touch;transition:transform .3s var(--ease),opacity .3s ease}
.offset-panel.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.offset-group{display:flex;gap:.25rem}
.offset-sep{width:1px;height:22px;background:var(--border);margin:0 .25rem;flex-shrink:0}
.offset-btn{min-width:48px;height:34px;font-size:.6875rem;font-weight:500;padding:0 .4rem;border-radius:var(--radius);letter-spacing:.02em;background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)}

.fab{position:fixed;right:8px;bottom:calc(var(--panel-h) + env(safe-area-inset-bottom,0px) + 46px);width:42px;height:42px;border-radius:999px;background:rgba(16,185,129,.14);border:1px solid rgba(16,185,129,.32);box-shadow:0 4px 18px rgba(0,0,0,.4);z-index:30;transition:bottom .3s var(--ease),transform .2s ease,box-shadow .2s ease}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(0,0,0,.5),0 0 18px var(--accent-glow)}
.fab:active{transform:scale(.95)}
.fab svg{width:18px;height:18px;stroke:var(--accent-bright);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
body.panel-hidden .fab{bottom:calc(46px + env(safe-area-inset-bottom,0px))}

.drop-overlay{position:fixed;inset:0;z-index:100;background:rgba(7,7,14,.92);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease}
.drop-overlay.active{opacity:1;pointer-events:auto}
.drop-content{text-align:center;padding:3rem 4rem;border:2px dashed var(--accent);border-radius:20px;background:rgba(16,185,129,.04);animation:dropPulse 2.5s ease-in-out infinite}
.drop-content svg{width:48px;height:48px;stroke:var(--accent);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;margin-bottom:.75rem}
.drop-content p{font-size:1.125rem;color:var(--text);margin-bottom:.35rem}
.drop-content small{font-size:.8125rem;color:var(--text-dim)}

.toast-rack{position:fixed;top:.75rem;right:.75rem;z-index:200;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
.toast{display:flex;align-items:center;gap:.5rem;padding:.6rem .9rem;background:rgba(17,17,25,.92);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.45);backdrop-filter:blur(14px);pointer-events:auto;cursor:pointer;max-width:340px;animation:toastIn .3s ease-out}
.toast.removing{animation:toastOut .25s ease-in forwards}
.toast svg{width:16px;height:16px;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;flex-shrink:0}
.toast-success svg{stroke:var(--accent)} .toast-error svg{stroke:var(--red)} .toast-warning svg{stroke:var(--yellow)} .toast-info svg{stroke:var(--blue)}
.toast p{margin:0;font-size:.8125rem;line-height:1.4}

.search-wrap{display:flex;align-items:center;position:relative}
.search-input{width:0;padding:0;border:none;background:transparent;color:var(--text);font-family:inherit;font-size:.8125rem;outline:none;opacity:0;transition:width .25s ease,opacity .2s ease,padding .25s ease}
.search-wrap.open .search-input{width:130px;padding:0 .5rem;opacity:1;border-bottom:1px solid var(--accent)}
.search-results{position:absolute;top:calc(100% + 6px);right:0;width:300px;max-height:200px;overflow-y:auto;background:rgba(12,12,22,.96);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(14px);display:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.search-results.active{display:block}
.search-item{padding:.4rem .6rem;cursor:pointer;font-size:.75rem;border-bottom:1px solid var(--border);display:flex;gap:.5rem;align-items:baseline;transition:background .15s ease}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:var(--hover)}
.search-time{color:var(--accent);font-variant-numeric:tabular-nums;flex-shrink:0;font-size:.6875rem}
.search-text{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-text mark{background:rgba(16,185,129,.25);color:var(--accent-bright);border-radius:2px;padding:0 1px}

.lang-wrap{position:relative}
.lang-panel{position:absolute;top:calc(100% + 6px);right:0;width:180px;max-height:264px;overflow-y:auto;background:rgba(12,12,22,.96);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(14px);z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.lang-panel.active{display:block}
.lang-item{padding:.42rem .65rem;cursor:pointer;font-size:.8125rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.45rem;transition:background .15s ease;color:var(--text)}
.lang-item:last-child{border-bottom:none}
.lang-item:hover{background:var(--hover)}
.lang-item.selected{color:var(--accent);font-weight:600}

/* Light Theme */
body.light-theme{
  --bg:#f1f5f9;--surface:rgba(0,0,0,.035);--border:rgba(0,0,0,.09);
  --hover:rgba(0,0,0,.05);--active:rgba(0,0,0,.09);
  --text:#1e293b;--text-dim:rgba(30,41,59,.45);
  --accent:#059669;--accent-bright:#10b981;--accent-glow:rgba(5,150,105,.2);
  background:#f1f5f9;
  background-image:radial-gradient(ellipse 80% 50% at 18% 40%,rgba(16,185,129,.06) 0%,transparent 100%),radial-gradient(ellipse 60% 50% at 82% 55%,rgba(59,130,246,.04) 0%,transparent 100%);
}
body.light-theme .subtitle{text-shadow:0 1px 3px rgba(0,0,0,.08)}
body.light-theme .offset-panel{background:rgba(241,245,249,.94)}
body.light-theme .toast{background:rgba(241,245,249,.95)}
body.light-theme .search-results{background:rgba(241,245,249,.96)}
body.light-theme .lang-panel{background:rgba(241,245,249,.96)}
body.light-theme .drop-overlay{background:rgba(241,245,249,.92)}
body.light-theme .offset-btn{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1)}
body.light-theme input[type="range"]{background:rgba(0,0,0,.1)}

@keyframes breathe{0%,100%{opacity:.4}50%{opacity:.72}}
@keyframes cueIn{from{opacity:.45;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(100%)}}
@keyframes dropPulse{0%,100%{border-color:var(--accent)}50%{border-color:var(--accent-bright)}}

@media(max-width:640px){
  .toolbar{gap:.25rem;padding:.4rem .5rem}
  .btn-icon{width:30px;height:30px} .btn-icon svg{width:14px;height:14px}
  .font-label{display:none} input[type="range"]{width:56px}
  .offset-btn{min-width:42px;height:30px;font-size:.625rem}
  .offset-panel{gap:.125rem;padding-right:48px;padding-left:.25rem}
  .offset-sep{margin:0 .125rem}
  .drop-content{padding:2rem}
  .search-wrap.open .search-input{width:80px}
  .hide-sm{display:none}
}
@media(max-width:380px){.offset-btn{min-width:36px;padding:0 .2rem;font-size:.6rem}}
@media(hover:none){.timeline{height:5px}}
</style>
</head>
<body>
  <div id="dropZone" class="drop-overlay" aria-hidden="true">
    <div class="drop-content">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p id="dropText">Drop your subtitle file here</p>
      <small id="dropFormats">Supports .srt, .vtt, and .txt formats</small>
    </div>
  </div>
  <div id="toasts" class="toast-rack" role="log" aria-live="polite" aria-label="Notifications"></div>

  <header class="toolbar" role="toolbar" aria-label="Controls">
    <button id="fileBtn" class="btn btn-icon" aria-label="Load file" title="Load file">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
    </button>
    <input id="fileInput" type="file" accept=".srt,.vtt,.txt,text/plain" class="sr-only" tabindex="-1" aria-hidden="true">
    <button id="compareBtn" class="btn btn-icon hide-sm" aria-label="Load comparison file" title="Compare">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    </button>
    <input id="compareInput" type="file" accept=".srt,.vtt,.txt,text/plain" class="sr-only" tabindex="-1" aria-hidden="true">
    <div class="toolbar-sep" aria-hidden="true"></div>
    <button id="playPauseBtn" class="btn btn-icon" aria-label="Play" title="Play (Space)">
      <svg viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21"/></svg>
    </button>
    <button id="resetBtn" class="btn btn-icon" aria-label="Reset" title="Reset (R)">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
    </button>
    <button id="exportBtn" class="btn btn-icon hide-sm" aria-label="Export SRT" title="Export SRT">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <div class="spacer"></div>
    <div class="search-wrap" id="searchWrap">
      <button id="searchBtn" class="btn btn-icon" aria-label="Search" title="Search (/)">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <input id="searchInput" class="search-input" type="text" placeholder="Search..." aria-label="Search subtitles">
      <div id="searchResults" class="search-results"></div>
    </div>
    <div class="toolbar-sep hide-sm" aria-hidden="true"></div>
    <div class="lang-wrap" id="langWrap">
      <button id="langBtn" class="btn btn-icon" aria-label="Select language" title="Language">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </button>
      <div id="langPanel" class="lang-panel" role="listbox" aria-label="Select language"></div>
    </div>
    <button id="themeBtn" class="btn btn-icon" aria-label="Toggle theme" title="Theme">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <div class="font-ctrl" role="group" aria-label="Font size">
      <span id="fontLabel" class="font-label" aria-hidden="true">36</span>
      <input id="fontRange" type="range" min="14" max="80" value="36" aria-label="Font size">
    </div>
    <button id="fullscreenBtn" class="btn btn-icon" aria-label="Fullscreen" title="Fullscreen (F)">
      <svg viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
    </button>
  </header>

  <main id="stage" class="stage">
    <div class="sub-stack">
      <div id="subtitle" class="subtitle placeholder" role="status" aria-live="polite" aria-atomic="true">
        Drop a subtitle file or click the file button to begin
      </div>
      <div id="subtitle2" class="subtitle subtitle-alt empty" aria-live="polite"></div>
    </div>
  </main>

  <div id="timeline" class="timeline" role="slider" aria-label="Progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
    <div id="timelineFill" class="timeline-fill"></div>
  </div>

  <footer class="status-bar" role="status" aria-label="Status">
    <span class="status-pill" id="fileInfo">No file loaded</span>
    <span class="status-pill" id="timeDisplay">00:00.000</span>
    <span class="status-pill" id="countDisplay">0 cues</span>
    <span class="status-pill" id="offsetDisplay">Offset: 0ms</span>
  </footer>

  <div id="offsetPanel" class="offset-panel" role="toolbar" aria-label="Offset">
    <div class="offset-group">
      <button class="btn offset-btn" data-step="-10000" aria-label="-10s">&minus;10s</button>
      <button class="btn offset-btn" data-step="-5000"  aria-label="-5s">&minus;5s</button>
      <button class="btn offset-btn" data-step="-1000"  aria-label="-1s">&minus;1s</button>
      <button class="btn offset-btn" data-step="-500"   aria-label="-.5s">&minus;.5</button>
      <button class="btn offset-btn" data-step="-100"   aria-label="-.1s">&minus;.1</button>
    </div>
    <div class="offset-sep" aria-hidden="true"></div>
    <div class="offset-group">
      <button class="btn offset-btn" data-step="100"   aria-label="+.1s">+.1</button>
      <button class="btn offset-btn" data-step="500"   aria-label="+.5s">+.5</button>
      <button class="btn offset-btn" data-step="1000"  aria-label="+1s">+1s</button>
      <button class="btn offset-btn" data-step="5000"  aria-label="+5s">+5s</button>
      <button class="btn offset-btn" data-step="10000" aria-label="+10s">+10s</button>
    </div>

  static toMs(h, m, s, ms) { return (+h)*3600000 + (+m)*60000 + (+s)*1000 + (+ms); }

  static sanitize(text) {
    let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s = s.replace(/&lt;(\/?)(b|i|u|em|strong)&gt;/gi, '<$1$2>');
    return s.replace(/\n/g, '<br>');
  }
}

// ── Storage ─────────────────────────────────────────────────────

class Storage {
  static get(k, fb) { try { const r = localStorage.getItem('syncsubs_'+k); return r !== null ? JSON.parse(r) : fb; } catch { return fb; } }
  static set(k, v)  { try { localStorage.setItem('syncsubs_'+k, JSON.stringify(v)); } catch {} }
}

// ── Toast ───────────────────────────────────────────────────────

class Toast {
  static container = document.getElementById('toasts');
  static icons = { success: Icons.check, error: Icons.error, warning: Icons.warning, info: Icons.info };
  static show(msg, type='info', dur=4000) {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `${Toast.icons[type]||Toast.icons.info}<p>${msg}</p>`;
    Toast.container.appendChild(el);
    const dismiss = () => { el.classList.add('removing'); el.addEventListener('animationend', () => el.remove(), {once:true}); };
    if (dur > 0) setTimeout(dismiss, dur);
    el.addEventListener('click', dismiss);
  }
}

// ── Player ──────────────────────────────────────────────────────

class Player {
  constructor() {
    this.subtitles = []; this.playing = false; this.startEpoch = 0;
    this.pausedAt = 0; this.offset = 0; this.cueIndex = 0; this.totalDuration = 0;
    this.altSubs = []; this.altIndex = 0;
  }

  get elapsed()      { return this.playing ? Date.now() - this.startEpoch + this.pausedAt : this.pausedAt; }
  get adjustedTime() { return this.elapsed + this.offset; }
  get progress()     { return this.totalDuration <= 0 ? 0 : Math.max(0, Math.min(1, this.adjustedTime / this.totalDuration)); }

  load(cues) { this.subtitles = cues; this.totalDuration = cues.length ? cues[cues.length-1].end : 0; this.reset(); }
  loadAlt(cues) { this.altSubs = cues; this.altIndex = 0; }

  play()  { if (!this.subtitles.length || this.playing) return false; this.startEpoch = Date.now(); this.playing = true; return true; }
  pause() { if (!this.playing) return false; this.pausedAt += Date.now() - this.startEpoch; this.playing = false; return true; }
  togglePlayPause() { return this.playing ? this.pause() : this.play(); }
  reset()     { this.playing = false; this.startEpoch = 0; this.pausedAt = 0; this.cueIndex = 0; this.altIndex = 0; }
  fullReset() { this.reset(); this.offset = 0; }
  seekTo(ms)  { this.pausedAt = Math.max(0, ms); if (this.playing) this.startEpoch = Date.now(); this.cueIndex = 0; this.altIndex = 0; }
  adjustOffset(d) { this.offset += d; }

  getCue(subs, idxProp) {
    if (!subs.length) return null;
    const t = this.adjustedTime;
    while (this[idxProp] > 0 && t < subs[this[idxProp]].start) this[idxProp]--;
    while (this[idxProp] < subs.length - 1 && t >= subs[this[idxProp]].end) this[idxProp]++;
    const c = subs[this[idxProp]];
    return (t >= c.start && t < c.end) ? c : null;
  }
  getCurrentCue() { return this.getCue(this.subtitles, 'cueIndex'); }
  getAltCue()     { return this.getCue(this.altSubs, 'altIndex'); }

  exportSRT() {
    if (!this.subtitles.length) return null;
    return this.subtitles.map((c, i) => {
      const s = Player.srtTimestamp(Math.max(0, c.start + this.offset));
      const e = Player.srtTimestamp(Math.max(0, c.end + this.offset));
      return `${i+1}\n${s} --> ${e}\n${c.text}`;
    }).join('\n\n') + '\n';
  }

  static srtTimestamp(ms) {
    ms = Math.round(Math.abs(ms));
    const h = String(Math.floor(ms/3600000)).padStart(2,'0');
    const m = String(Math.floor((ms%3600000)/60000)).padStart(2,'0');
    const s = String(Math.floor((ms%60000)/1000)).padStart(2,'0');
    const l = String(ms%1000).padStart(3,'0');
    return `${h}:${m}:${s},${l}`;
  }

  static formatTime(ms) {
    const neg = ms < 0; ms = Math.abs(Math.round(ms));
    const h = Math.floor(ms/3600000);
    const mm = String(Math.floor((ms%3600000)/60000)).padStart(2,'0');
    const ss = String(Math.floor((ms%60000)/1000)).padStart(2,'0');
    const ml = String(ms%1000).padStart(3,'0');
    return (neg?'\u2212':'') + (h > 0 ? `${h}:` : '') + `${mm}:${ss}.${ml}`;
  }
}

// ── UI ──────────────────────────────────────────────────────────

class UI {
  constructor(player) {
    this.player = player;
    this.rafId = null; this.lastCue = undefined; this.lastAlt = undefined; this.dragCounter = 0;

    this.el = {};
    ['fileBtn','fileInput','compareBtn','compareInput','playPauseBtn','resetBtn','exportBtn',
     'searchWrap','searchBtn','searchInput','searchResults','langBtn','langWrap','langPanel','themeBtn',
     'fontRange','fontLabel','fullscreenBtn','subtitle','subtitle2',
     'timeline','timelineFill','fileInfo','timeDisplay','countDisplay','offsetDisplay',
     'offsetPanel','fab','dropZone','dropText','dropFormats'].forEach(id => {
      this.el[id] = document.getElementById(id);
    });

    this.restore();
    this.bind();
  }

  restore() {
    const fs = Storage.get('fontSize', 36);
    this.el.fontRange.value = fs; this.el.fontLabel.textContent = fs;
    this.el.subtitle.style.fontSize = fs + 'px';
    this.setPanelVisible(Storage.get('panelVisible', true));

    const savedLang = Storage.get('lang', 'en');
    Lang.set(savedLang);
    this.buildLangPanel();
    this.applyLang();

    if (Storage.get('theme', 'dark') === 'light') this.setTheme(true);
  }

  applyLang() {
    const t = Lang.t.bind(Lang);
    this.el.dropText.textContent = t('dropHere');
    this.el.dropFormats.textContent = t('dropFmt');
    if (!this.player.subtitles.length) {
      this.el.fileInfo.textContent = t('noFile');
      this.el.subtitle.textContent = t('idle');
    }
  }

  bind() {
    this.el.fileBtn.addEventListener('click', () => this.el.fileInput.click());
    this.el.fileInput.addEventListener('change', e => { if (e.target.files?.[0]) this.loadFile(e.target.files[0]); e.target.value = ''; });

    this.el.compareBtn.addEventListener('click', () => this.el.compareInput.click());
    this.el.compareInput.addEventListener('change', e => { if (e.target.files?.[0]) this.loadCompare(e.target.files[0]); e.target.value = ''; });

    this.el.playPauseBtn.addEventListener('click', () => this.togglePlayPause());
    this.el.resetBtn.addEventListener('click', () => this.handleReset());
    this.el.exportBtn.addEventListener('click', () => this.handleExport());

    this.el.searchBtn.addEventListener('click', () => this.toggleSearch());
    this.el.searchInput.addEventListener('input', e => this.handleSearch(e.target.value));
    this.el.searchResults.addEventListener('click', e => {
      const item = e.target.closest('.search-item');
      if (!item) return;
      this.player.seekTo(+item.dataset.time - this.player.offset);
      this.renderOnce(); this.closeSearch();
    });

    this.el.langBtn.addEventListener('click', e => { e.stopPropagation(); this.toggleLangPanel(); });
    this.el.langPanel.addEventListener('click', e => {
      const item = e.target.closest('.lang-item'); if (!item) return;
      this.selectLang(item.dataset.code);
    });
    document.addEventListener('click', e => { if (!this.el.langWrap.contains(e.target)) this.closeLangPanel(); });
    this.el.themeBtn.addEventListener('click', () => this.setTheme(!document.body.classList.contains('light-theme')));

    this.el.fontRange.addEventListener('input', e => {
      const s = +e.target.value; this.el.fontLabel.textContent = s;
      this.el.subtitle.style.fontSize = s + 'px'; Storage.set('fontSize', s);
    });

    this.el.fullscreenBtn.addEventListener('click', () => this.toggleFullscreen());
    document.addEventListener('fullscreenchange', () => this.syncFsIcon());
    document.addEventListener('webkitfullscreenchange', () => this.syncFsIcon());

    this.el.fab.addEventListener('click', () => this.togglePanel());
    this.el.offsetPanel.addEventListener('click', e => {
      const b = e.target.closest('[data-step]'); if (!b) return;
      const d = parseInt(b.dataset.step, 10); if (!Number.isFinite(d)) return;
      this.player.adjustOffset(d); this.syncOffset(); this.renderOnce();
    });

    this.bindTimeline(); this.bindDragDrop(); this.bindKeyboard();
  }

  loadFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      const cues = SRTParser.parse(reader.result);
      if (!cues.length) { Toast.show(Lang.t('noValid'), 'error'); return; }
      this.player.load(cues);
      this.el.fileInfo.textContent = file.name;
      this.el.countDisplay.textContent = cues.length + ' ' + Lang.t('cues');
      this.syncOffset(); this.showReady();
      Toast.show(`${Lang.t('loaded')} ${cues.length} ${Lang.t('cues')} ${Lang.t('from')} ${file.name}`, 'success');
    };
    reader.onerror = () => Toast.show(Lang.t('readErr'), 'error');
    reader.readAsText(file, 'utf-8');
  }

  loadCompare(file) {
    const reader = new FileReader();
    reader.onload = () => {
      const cues = SRTParser.parse(reader.result);
      if (!cues.length) { Toast.show(Lang.t('noValid'), 'error'); return; }
      this.player.loadAlt(cues);
      Toast.show(`${Lang.t('compLoaded')}: ${cues.length} ${Lang.t('cues')}`, 'success');
    };
    reader.onerror = () => Toast.show(Lang.t('readErr'), 'error');
    reader.readAsText(file, 'utf-8');
  }

  showReady() {
    this.el.subtitle.className = 'subtitle placeholder';
    this.el.subtitle.textContent = Lang.t('ready');
    this.el.timeDisplay.textContent = '00:00.000';
    this.el.timelineFill.style.width = '0%';
    this.lastCue = undefined; this.lastAlt = undefined;
  }

  togglePlayPause() {
    if (this.player.playing) { this.player.pause(); this.stopLoop(); }
    else { if (this.player.play()) this.startLoop(); }
    this.syncPlayBtn();
  }

  handleReset() {
    this.stopLoop(); this.player.fullReset(); this.syncPlayBtn(); this.syncOffset();
    if (this.player.subtitles.length) this.showReady();
    else { this.el.subtitle.className = 'subtitle placeholder'; this.el.subtitle.textContent = Lang.t('idle'); }
    this.el.timeDisplay.textContent = '00:00.000'; this.el.timelineFill.style.width = '0%';
    this.el.subtitle2.innerHTML = ''; this.el.subtitle2.classList.add('empty');
  }

  handleExport() {
    const srt = this.player.exportSRT();
    if (!srt) { Toast.show(Lang.t('noSubs'), 'warning'); return; }
    const blob = new Blob([srt], { type: 'text/srt;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'synced_subtitles.srt'; a.click();
    URL.revokeObjectURL(url);
    Toast.show(Lang.t('exported'), 'success');
  }

  syncPlayBtn() {
    const b = this.el.playPauseBtn;
    if (this.player.playing) { b.innerHTML = Icons.pause; b.setAttribute('aria-label','Pause'); b.title = 'Pause (Space)'; }
    else { b.innerHTML = Icons.play; b.setAttribute('aria-label','Play'); b.title = 'Play (Space)'; }
  }

  startLoop() {
    this.el.subtitle.classList.remove('placeholder');
    const tick = () => { this.render(); this.rafId = requestAnimationFrame(tick); };
    this.rafId = requestAnimationFrame(tick);
  }
  stopLoop() { if (this.rafId !== null) { cancelAnimationFrame(this.rafId); this.rafId = null; } }

  render() {
    const cue = this.player.getCurrentCue();
    if (cue !== this.lastCue) {
      this.lastCue = cue;
      const el = this.el.subtitle;
      if (cue) { el.innerHTML = SRTParser.sanitize(cue.text); el.classList.remove('empty','cue-enter'); void el.offsetWidth; el.classList.add('cue-enter'); }
      else { el.innerHTML = ''; el.classList.add('empty'); }
    }
    if (this.player.altSubs.length) {
      const alt = this.player.getAltCue();
      if (alt !== this.lastAlt) {
        this.lastAlt = alt;
        const el2 = this.el.subtitle2;
        if (alt) { el2.innerHTML = SRTParser.sanitize(alt.text); el2.classList.remove('empty','cue-enter'); void el2.offsetWidth; el2.classList.add('cue-enter'); }
        else { el2.innerHTML = ''; el2.classList.add('empty'); }
      }
    }
    this.el.timeDisplay.textContent = Player.formatTime(this.player.adjustedTime);
    this.el.timelineFill.style.width = (this.player.progress * 100).toFixed(2) + '%';
  }

  renderOnce() { if (!this.player.playing) this.render(); }

  toggleSearch() {
    const w = this.el.searchWrap;
    if (w.classList.toggle('open')) { this.el.searchInput.focus(); }
    else this.closeSearch();
  }
  closeSearch() {
    this.el.searchWrap.classList.remove('open');
    this.el.searchInput.value = '';
    this.el.searchResults.classList.remove('active');
  }
  handleSearch(q) {
    if (q.length < 2) { this.el.searchResults.classList.remove('active'); return; }
    const matches = this.player.subtitles.filter(c => c.text.toLowerCase().includes(q.toLowerCase()));
    if (!matches.length) { this.el.searchResults.classList.remove('active'); return; }
    const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(${esc})`, 'gi');
    this.el.searchResults.innerHTML = matches.slice(0, 25).map(c => {
      const txt = c.text.replace(/\n/g, ' ').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(re, '<mark>$1</mark>');
      return `<div class="search-item" data-time="${c.start}"><span class="search-time">${Player.formatTime(c.start)}</span><span class="search-text">${txt}</span></div>`;
    }).join('');
    this.el.searchResults.classList.add('active');
  }

  buildLangPanel() {
    this.el.langPanel.innerHTML = Lang.list.map(l =>
      `<div class="lang-item${l.code === Lang.current ? ' selected' : ''}" data-code="${l.code}" role="option">${l.flag} ${l.name}</div>`
    ).join('');
  }
  toggleLangPanel() { this.el.langPanel.classList.toggle('active'); }
  closeLangPanel() { this.el.langPanel.classList.remove('active'); }
  selectLang(code) {
    Lang.set(code);
    this.applyLang();
    this.buildLangPanel();
    this.closeLangPanel();
    const chosen = Lang.list.find(l => l.code === code);
    Toast.show(`${chosen ? chosen.flag + ' ' + chosen.name : code}`, 'info', 2000);
  }

  setTheme(light) {
    document.body.classList.toggle('light-theme', light);
    this.el.themeBtn.innerHTML = light ? Icons.moon : Icons.sun;
    document.querySelector('meta[name="theme-color"]').content = light ? '#f1f5f9' : '#07070e';
    Storage.set('theme', light ? 'light' : 'dark');
  }

  bindTimeline() {
    const tl = this.el.timeline; let dragging = false;
    const seek = (x) => { const r = tl.getBoundingClientRect(); const ratio = Math.max(0,Math.min(1,(x-r.left)/r.width)); this.player.seekTo(ratio * this.player.totalDuration - this.player.offset); this.render(); };
    tl.addEventListener('mousedown', e => { dragging = true; tl.classList.add('dragging'); seek(e.clientX); });
    window.addEventListener('mousemove', e => { if (dragging) seek(e.clientX); });
    window.addEventListener('mouseup', () => { if (dragging) { dragging = false; tl.classList.remove('dragging'); } });
    tl.addEventListener('touchstart', e => { dragging = true; tl.classList.add('dragging'); seek(e.touches[0].clientX); }, {passive:true});
    tl.addEventListener('touchmove', e => { if (dragging) seek(e.touches[0].clientX); }, {passive:true});
    tl.addEventListener('touchend', () => { dragging = false; tl.classList.remove('dragging'); }, {passive:true});
  }

  bindDragDrop() {
    const dz = this.el.dropZone;
    document.addEventListener('dragenter', e => { e.preventDefault(); this.dragCounter++; if (this.dragCounter===1) dz.classList.add('active'); });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('dragleave', e => { e.preventDefault(); this.dragCounter--; if (this.dragCounter<=0){this.dragCounter=0;dz.classList.remove('active');} });
    document.addEventListener('drop', e => { e.preventDefault(); this.dragCounter=0; dz.classList.remove('active'); const f=e.dataTransfer?.files[0]; if(f) this.loadFile(f); });
  }

  bindKeyboard() {
    window.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' && e.target.type === 'text') {
        if (e.code === 'Escape') this.closeSearch();
        return;
      }
      switch (e.code) {
        case 'Space': e.preventDefault(); this.togglePlayPause(); break;
        case 'KeyF': this.toggleFullscreen(); break;
        case 'KeyR': this.handleReset(); Toast.show(Lang.t('resetMsg'),'info',2000); break;
        case 'ArrowLeft': case 'Comma': e.preventDefault(); this.player.adjustOffset(-1000); this.syncOffset(); this.renderOnce(); break;
        case 'ArrowRight': case 'Period': e.preventDefault(); this.player.adjustOffset(1000); this.syncOffset(); this.renderOnce(); break;
        case 'ArrowUp': e.preventDefault(); this.changeFontSize(2); break;
        case 'ArrowDown': e.preventDefault(); this.changeFontSize(-2); break;
        case 'Slash': e.preventDefault(); this.toggleSearch(); break;
        case 'KeyP': this.togglePanel(); break;
        case 'Escape': if (!document.fullscreenElement && !document.webkitFullscreenElement) this.togglePanel(); break;
      }
    });
  }

  toggleFullscreen() {
    const r = document.documentElement;
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      const req = r.requestFullscreen || r.webkitRequestFullscreen;
      if (req) { try { req.call(r)?.catch?.(() => {}); } catch {} }
    } else { const exit = document.exitFullscreen || document.webkitExitFullscreen; if (exit) exit.call(document); }
  }
  syncFsIcon() {
    const fs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    this.el.fullscreenBtn.innerHTML = fs ? Icons.minimize : Icons.maximize;
  }

  togglePanel() { this.setPanelVisible(this.el.offsetPanel.classList.contains('hidden')); }
  setPanelVisible(show) {
    this.el.offsetPanel.classList.toggle('hidden', !show);
    this.el.fab.setAttribute('aria-expanded', String(show));
    document.body.classList.toggle('panel-hidden', !show);
    Storage.set('panelVisible', show);
  }

  syncOffset() { const ms = this.player.offset; this.el.offsetDisplay.textContent = `${Lang.t('offset')}: ${ms>0?'+':''}${ms}ms`; }
  changeFontSize(d) {
    const r = this.el.fontRange; const v = Math.max(+r.min, Math.min(+r.max, +r.value + d));
    r.value = v; this.el.fontLabel.textContent = v; this.el.subtitle.style.fontSize = v+'px'; Storage.set('fontSize', v);
  }
}

// ── Bootstrap ───────────────────────────────────────────────────

class App {
  constructor() { this.player = new Player(); this.ui = new UI(this.player); this.registerSW(); }
  registerSW() { if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{}); }
}
new App();
</script>
